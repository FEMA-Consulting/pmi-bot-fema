<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FE.MA. Consulting - Assistente Virtuale</title>
  <meta
    name="description"
    content="Assistente virtuale FE.MA. Consulting per un primo orientamento su Patent Box e crediti d’imposta."
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="chat-section">
      <div class="chat-widget">
        <div class="chat-header">
          <div class="chat-header-title">FE.MA. Consulting</div>
          <div class="chat-header-subtitle">Assistente virtuale</div>
        </div>

        <div id="chat-body" class="chat-body"></div>

        <div id="quick-actions" class="quick-actions"></div>

        <form id="chat-form" class="chat-form">
          <input
            type="text"
            id="chat-input"
            placeholder="Scrivi qui il tuo messaggio..."
            autocomplete="off"
          />
          <button type="submit">Invia</button>
        </form>
      </div>
    </section>

    <section class="lead-section">
      <div class="lead-box">
        <h2>Richiedi una verifica preliminare</h2>
        <p>
          Se preferisci, puoi lasciare qui i tuoi dati per essere ricontattato.
        </p>

        <form id="lead-form">
          <input
            type="text"
            id="lead-nome"
            name="nome"
            placeholder="Nome"
            required
          />

          <input
            type="text"
            id="lead-azienda"
            name="azienda"
            placeholder="Azienda"
            required
          />

          <input
            type="email"
            id="lead-email"
            name="email"
            placeholder="Email"
            required
          />

          <input
            type="text"
            id="lead-telefono"
            name="telefono"
            placeholder="Telefono (facoltativo)"
          />

          <textarea
            id="lead-note"
            name="note"
            placeholder="Breve descrizione del caso"
          ></textarea>

          <button type="submit">Invia richiesta</button>
        </form>

        <div id="lead-response"></div>
      </div>
    </section>
  </main>

  <script src="widget.js"></script>
</body>
</html>
